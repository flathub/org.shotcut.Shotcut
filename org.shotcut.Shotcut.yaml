app-id: org.shotcut.Shotcut
default-branch: beta
desktop-file-name-suffix: ' (Beta)'
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: shotcut
finish-args:
  - --require-version=0.11.4 # fixes file saving
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --share=network
  - --filesystem=host
  - --socket=pulseaudio
  # JACK
  - --filesystem=xdg-run/pipewire-0
  - --env=FREI0R_PATH=/app/lib/frei0r-1
  - --env=LADSPA_PATH=/app/extensions/Plugins/ladspa:/app/lib/ladspa
  - --env=QT_QUICK_CONTROLS_CONF=:/resources/qtquickcontrols2-dark.conf
add-extensions:
  org.freedesktop.LinuxAudio.Plugins:
    directory: extensions/Plugins
    version: '24.08'
    add-ld-path: lib
    merge-dirs: ladspa
    subdirectories: true
    no-autodownload: true
  org.freedesktop.LinuxAudio.Plugins.swh:
    directory: extensions/Plugins/swh
    version: '24.08'
    add-ld-path: lib
    merge-dirs: ladspa
    autodelete: false
    subdirectories: true
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'
modules:

  - name: whisper.cpp
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DBUILD_APPS=OFF
      - -DENABLE_AVX512=ON
    cleanup:
      - '/include'
      - '/lib/cmake'
      - '/lib/pkgconfig'
    post-install:
      - install -Dm755 bin/whisper-cli -t /app/bin
    sources:
      - type: archive
        url: https://github.com/ggerganov/whisper.cpp/archive/refs/tags/v1.8.0.tar.gz
        sha256: c006a5e472ee41e7a733d0bf7326e339c8b281d3a91a1c8a35468fa0a051940f

  - name: eigen
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/5.0.0/eigen-5.0.0.tar.bz2
        sha256: bdca0ec740fb83be21fe038699923f4c589ead9ab904f4058a9c97752e60d50b

  - name: fftw-float
    config-opts:
      - --disable-doc
      - --enable-shared
      - --disable-static
      - --enable-threads
      - --enable-float
    build-options:
      arch:
        x86_64:
          config-opts:
            - --enable-avx
            - --enable-openmp
            - --enable-sse
        aarch64:
          config-opts:
            - --enable-neon
            - --enable-openmp
    cleanup:
      - /bin
    sources:
      - type: archive
        url: http://www.fftw.org/fftw-3.3.10.tar.gz
        sha256: 56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467

  - name: zimg
    cleanup:
      - /share
    sources:
      - type: git
        url: https://github.com/sekrit-twc/zimg.git
        commit: 51c3c7f750c2af61955377faad56e3ba1b03589f

  - name: movit
    make-args:
      - libmovit.la
    sources:
      - type: git
        url: https://github.com/ddennedy/movit.git
        # branch: shotcut-opengl3
        commit: c647b2a0edc1e3a2c2d8600c3f822f5d48268793

  - name: sox
    config-opts:
      - --disable-static
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/sox/sox/14.4.2/sox-14.4.2.tar.bz2
        sha256: 81a6956d4330e75b5827316e44ae381e6f1e8928003c6aa45896da9041ea149c
        mirror-urls:
          - http://http.debian.net/debian/pool/main/s/sox/sox_14.4.2.orig.tar.bz2
      - type: patch
        path: patches/sox-build.patch

  - name: vid.stab
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: git
        url: https://github.com/georgmartius/vid.stab.git
        commit: 4bd81e3cdd778e2e0edc591f14bba158ec40cfa1
  
  - name: frei0r-plugins
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: git
        url: https://github.com/dyne/frei0r.git
        commit: f081aa64d4fb99fb1f16dce7dff8d6a989794afa
        tag: v2.5.1

  - name: ladspa-sdk
    no-autogen: true
    subdir: src
    make-install-args:
      - INSTALL_PLUGINS_DIR=/app/lib/ladspa
      - INSTALL_INCLUDE_DIR=/app/include
      - INSTALL_BINARY_DIR=/app/bin
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://deb.debian.org/debian/pool/main/l/ladspa-sdk/ladspa-sdk_1.17.orig.tar.gz
        sha256: d9d596171d93f9c226fcdb7e27c6f917422ac487efe2c05e0a18094df4268061

  - name: x264
    config-opts:
      - --disable-cli
      - --enable-shared
    sources:
      - type: git
        url: https://github.com/mirror/x264.git
        # branch: stable
        commit: 31e19f92f00c7003fa115047ce50978bc98c3a0d

  - name: x265
    buildsystem: cmake-ninja
    builddir: true
    subdir: source
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DENABLE_CLI=OFF
    sources:
      - type: archive
        url: https://bitbucket.org/multicoreware/x265_git/downloads/x265_4.1.tar.gz
        sha256: a31699c6a89806b74b0151e5e6a7df65de4b49050482fe5ebf8a4379d7af8f29

  - name: nv-codec-headers
    no-autogen: true
    make-install-args:
      - PREFIX=/app
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://github.com/FFmpeg/nv-codec-headers.git
        commit: 451da99614412a7f9526ef301a5ee0c7a6f9ad76
        tag: n12.0.16.1

  - name: vmaf
    buildsystem: meson
    subdir: libvmaf
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://github.com/Netflix/vmaf.git
        commit: 17a67b238ce0539bdeafdc95961abac64fa16ea8
        tag: v3.0.0

  - name: vmaf-models
    buildsystem: simple
    build-commands:
      - install -v -d /app/share
      - install -v -p -c model/*.json /app/share
    sources:
      - type: git
        url: https://github.com/Netflix/vmaf.git
        commit: 17a67b238ce0539bdeafdc95961abac64fa16ea8
        tag: v3.0.0

  - name: SVT-AV1
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DBUILD_APPS=OFF
      - -DENABLE_AVX512=ON
    sources:
      - type: git
        url: https://gitlab.com/AOMediaCodec/SVT-AV1.git
        commit: b33dcc56cc64fcb3b3569094af8ab1d0d81ab4c1
        tag: v3.1.2

  - name: ffmpeg
    config-opts:
      - --enable-rpath
      - --enable-gpl
      - --enable-version3
      - --disable-static
      - --enable-shared
      - --disable-doc
      - --disable-alsa
      - --enable-libfontconfig
      - --enable-libfreetype
      - --enable-libopus
      - --enable-libpulse
      - --enable-librsvg
      - --enable-libvpx
      - --enable-libdav1d
      - --enable-libsvtav1
      - --enable-libxml2
      - --enable-libx264
      - --enable-libx265
      - --enable-libmp3lame
      - --enable-libtheora
      - --enable-libvmaf
      - --enable-libvorbis
      - --enable-libwebp
      - --enable-libaom
      - --enable-libzimg
      - --disable-decoder=libaom_av1
      - --enable-nvenc
      - --enable-vaapi
    cleanup:
      - /share/ffmpeg/examples
    sources:
      - type: git
        url: https://github.com/FFmpeg/FFmpeg.git
        # branch: release/8.0
        commit: dc8af5879d98f922281ced1a7067caa35267e8f5

  - name: libspatialaudio
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: git
        url: https://github.com/videolabs/libspatialaudio.git
        commit: 0b6b25eba39fe1d2f4a981867957b9dcf62016db

  - name: potrace
    config-opts:
      - --with-libpotrace
      - --disable-static
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/potrace/1.16/potrace-1.16.tar.gz
        sha256: be8248a17dedd6ccbaab2fcc45835bb0502d062e40fbded3bc56028ce5eb7acc

  - name: glaxnimate
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DPotrace_PREFIX=/app
      - -DLibav_PREFIX=/app
      - -DCMAKE_PREFIX_PATH=/app
    build-commands:
      - ninja translations
    sources:
      - type: git
        url: https://gitlab.com/ddennedy/glaxnimate
        disable-shallow-clone: true
        commit: a6404e71ecfd06cc1cae24acee9646a0d722c5f3
        # branch: v0.5.4

  - name: rubberband
    buildsystem: meson
    cleanup:
      - /bin
    sources: 
      - type: archive
        url: https://breakfastquay.com/files/releases/rubberband-4.0.0.tar.bz2
        sha256: af050313ee63bc18b35b2e064e5dce05b276aaf6d1aa2b8a82ced1fe2f8028e9

  - name: bigsh0t
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    no-make-install: true
    post-install:
      - cp -v bigsh0t-*-linux/lib/frei0r-1/*.so /app/lib/frei0r-1
    sources:
      - type: git
        url: https://bitbucket.org/leo_sutic/bigsh0t.git
        commit: ec8c0c6eb2192c33d15918202c7b0575ed2c67a3
        # tag: '2.7'

  - name: opencv
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DOPENCV_EXTRA_MODULES_PATH=../opencv_contrib/modules
      - -DBUILD_LIST=core,imgproc,plot,video,tracking
      - -DOPENCV_GENERATE_PKGCONFIG=YES
      - -DWITH_OPENMP=ON
      - -DBUILD_WITH_DEBUG_INFO=OFF
      - -DBUILD_TESTS=OFF
      - -DBUILD_PERF_TESTS=OFF
      - -DBUILD_EXAMPLES=OFF
      - -DINSTALL_C_EXAMPLES=OFF
      - -DINSTALL_PYTHON_EXAMPLES=OFF
      - -DWITH_1394=OFF
      - -DWITH_V4L=OFF
      - -DWITH_PROTOBUF=OFF
      - -DWITH_GTK=OFF
      - -DWITH_CAROTENE=OFF # for ARM
    cleanup:
      - /lib/cmake
      - /bin/*
    sources:
      - type: git
        url: https://github.com/ddennedy/opencv.git
        commit: d1201b2ec2245823b16a930841af6ae3661f930d
        # branch: '4.x'

  - name: mlt
    buildsystem: cmake-ninja
    config-opts:
      - -DMOD_GLAXNIMATE_QT6=ON
      - -DMOD_OPENCV=ON
      - -DMOD_SPATIALAUDIO=ON
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_PREFIX_PATH=/app
    sources:
      - type: git
        url: https://github.com/mltframework/mlt.git
        commit: 5646c2fd632656b31f775198d9516ec4588270cd

  - name: shotcut
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DEXTERNAL_LAUNCHERS=OFF
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DSHOTCUT_VERSION=25.12.2
    post-install:
      - install -d /app/extensions/Plugins
    sources:
      - type: git
        url: https://github.com/mltframework/shotcut.git
        commit: 905f8252465a13d6fcdf47bdcf36a876b85f7c8b
        # tag: v25.12.2

  - name: gopro2gpx
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    no-make-install: true
    post-install:
      - install -p -c gopro2gpx /app/bin
    sources:
      - type: git
        url: https://github.com/ddennedy/gopro2gpx.git
        commit: eed1661edb1f0f22d882d3b0352b6197c5e93495
